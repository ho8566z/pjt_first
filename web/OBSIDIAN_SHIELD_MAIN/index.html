<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN SHIELD</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="header">
        <div class="brand">
            <div class="logo">◆</div>
            <div>
                <h1>OBSIDIAN SHIELD</h1>
                <p>AI 기반 실시간 추적 관제 시스템</p>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="radar radar-1"></div>
        <div class="radar radar-2"></div>

        <section class="hero">
            <div class="visual-left">
                <div class="cctv"></div>
                <div class="city"></div>
            </div>

            <div class="center-area">
                <div class="title-box">
                    <h2>OBSIDIAN<br>SHIELD</h2>
                    <p>AI 기반 실시간 추적 관제 시스템</p>
                </div>

                <div class="login-card">
                    <div class="input-box">
                        <span class="icon">👤</span>
                        <strong>ID</strong>
                        <input type="text" placeholder="아이디를 입력하세요">
                    </div>

                    <div class="input-box">
                        <span class="icon">🔒</span>
                        <strong>PW</strong>
                        <input type="password" placeholder="비밀번호를 입력하세요">
                    </div>

                    <button type="button">로그인</button>
                </div>
            </div>

            <div class="visual-right">
                <div class="drone">
                    <div class="body"></div>
                    <div class="arm arm-1"></div>
                    <div class="arm arm-2"></div>
                    <div class="prop p1"></div>
                    <div class="prop p2"></div>
                    <div class="prop p3"></div>
                    <div class="prop p4"></div>
                </div>

                <div class="feature-list">
                    <div class="feature">
                        <div class="feature-icon">🧠</div>
                        <div>
                            <h3>AI 기반</h3>
                            <p>지능형 영상 분석</p>
                        </div>
                    </div>

                    <div class="feature">
                        <div class="feature-icon">◎</div>
                        <div>
                            <h3>실시간 추적</h3>
                            <p>대상 자동 추적</p>
                        </div>
                    </div>

                    <div class="feature">
                        <div class="feature-icon">🛡</div>
                        <div>
                            <h3>통합 관제</h3>
                            <p>다중 장비 연동</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 OBSIDIAN SHIELD · 쩜오 Company
    </footer>
</body>
</html>
