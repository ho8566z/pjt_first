<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 로그</title>

    <link rel="stylesheet"
        href="{{ url_for('event_log.static', filename='css/logger.css') }}">
</head>
<body>

<div class="container">

    <header class="page_header">
        <h2>이벤트 로그</h2>

        <a class="btn_download" href="{{ url_for('event_log.export_event_data') }}">
            엑셀 다운로드
        </a>
    </header>

    <article class="table_wrap">

        <table class="log_table">

            <thead>
                <tr>
                    <th>No.</th>
                    <th>이벤트 ID</th>
                    <th>발생 시간</th>
                    <th>위도</th>
                    <th>경도</th>
                    <th>대상 ID</th>
                </tr>
            </thead>

            <tbody>

                {% for event in events %}

                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ event.ID }}</td>
                    <td>{{ event.REG_DATE }}</td>
                    <td>{{ event.latitude }}</td>
                    <td>{{ event.longitude }}</td>
                    <td>{{ event.TARGET_ID }}</td>
                </tr>

                {% else %}

                <tr>
                    <td colspan="6" class="empty">
                        등록된 이벤트 로그가 없습니다.
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </article>

</div>

</body>
</html>
