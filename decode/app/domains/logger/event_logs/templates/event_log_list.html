<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <h2>이벤트 로그</h2>

    <article id="evnet_logs_wrap">
        <table class="evnet_logs_form">

            <tr>
                <th>ID</th>
                <th>카메라</th>
                <th>시간</th>
                <th>장소</th>
                <th>대상</th>
            </tr>

            {% for key, event in events.items() %}
            <tr>
                <td>{{ event.ID }}</td>
                <td>{{ event.CAMERA_ID }}</td>
                <td>{{ event.REG_DATE }}</td>
                <td>
                    {% for place in event.PLACE %}
                        {{ place.latitude }}, {{ place.longitude }}, {{ place.altitude }}
                    {% endfor %}
                </td>
                <td>{{ event.TARGET_ID }}</td>
            </tr>
            {% endfor %}

        </table>

        <div style="margin-bottom: 15px;">
            <a href="{{ url_for('event_log.download_excel') }}" class="btn btn-success">
                엑셀 다운로드
            </a>
        </div>
    </article>
</body>
</html>
